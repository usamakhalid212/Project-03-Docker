version: "3.9"

services:

  portfolio:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: portfolio

    ports:
      - "8080:80"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - portfolio-network

networks:

  portfolio-network:

    driver: bridge
